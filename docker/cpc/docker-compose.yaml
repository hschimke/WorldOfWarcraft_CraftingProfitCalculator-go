version: "3.9"
services:
  web:
    image: cpc/web-serv
    ports:
      - "8080:8080"
    volumes:
      - static_files:/data/static_files
    restart: unless-stopped
    environment:
      - CLIENT_ID
      - CLIENT_SECRET
      - LOG_LEVEL=info
      - SERVER_PORT=8080
      - REDIS_URL=redis://:${REDIS_PSSWD}@redis
      - STANDALONE_CONTAINER=normal
      - DISABLE_AUCTION_HISTORY=false
      - DATABASE_CONNECTION_STRING=user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} host=postgres port=5432 dbname=${POSTGRES_DB}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      job-runner:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
  job-runner:
    image: cpc/job-run
    volumes:
      - static_files:/data/static_files
    restart: unless-stopped
    environment:
      - CLIENT_ID
      - CLIENT_SECRET
      - LOG_LEVEL=info
      - REDIS_URL=redis://:${REDIS_PSSWD}@redis
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
  injest:
    image: cpc/injest
    volumes:
      - static_files:/data/static_files
    restart: unless-stopped
    environment:
      - CLIENT_ID
      - CLIENT_SECRET
      - LOG_LEVEL=info
      - REDIS_URL=redis://:${REDIS_PSSWD}@redis
      - DISABLE_AUCTION_HISTORY=false
      - DATABASE_CONNECTION_STRING=user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} host=postgres port=5432 dbname=${POSTGRES_DB}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - "~/docker-dirs/cpc/reddis:/data"
    command: redis-server --save 380 15 --loglevel warning --requirepass ${REDIS_PSSWD}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
  postgres:
    image: postgres:alpine
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - "~/docker-dirs/cpc/postgres:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

volumes:
  static_files: